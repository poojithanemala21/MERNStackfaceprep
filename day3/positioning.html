<!DOCTYPE html>
<html>
<head>
<style>
.box{
    width:150px;
    height:100px;
    background:skyblue;
    position:static;
}
.box1{
    width:150px;
    height:100px;
    background:orange;
    position:relative;
    left:50px;
    top:20px;
}
</style>
</head>
<body>

<div class="box">Static Position</div>
<div class="box1">Relative Position</div>

</body>
</html>
