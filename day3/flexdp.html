<!DOCTYPE html>
<html>
<head>
<style>

.container{
    display:flex;
    gap:10px;
}

.box{
    width:100px;
    height:100px;
    background-color:orange;
    text-align:center;
    line-height:100px;
}
.container1{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:10px;
}

.box1{
    background-color:skyblue;
    padding:20px;
    text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="box">1</div>
<div class="box">2</div>
<div class="box">3</div>

</div>
<br>
<div class="container1">
<div class="box1">1</div>
<div class="box1">2</div>
<div class="box1">3</div>
<div class="box1">4</div>
<div class="box1">5</div>
<div class="box1">6</div>
</div>

</body>
</html>
