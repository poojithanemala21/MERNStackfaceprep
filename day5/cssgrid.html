<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<style>
.container{
    display:grid;
    grid-template-columns:200px 200px 200px;
    gap:20px;
}

.box{
    background:orange;
    padding:30px;
    text-align:center;
    color:white;
}
</style>
</head>
<body>

<div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
</div>

</body>
</html>
