<!DOCTYPE html>
<html>
<head>
<title>CSS simple selectors</title>
<link rel="stylesheet" href="simpleselector.css"/>
</head>
<body>
<h1 class="h1">Class Selector</h1>
<p>Class Selector is used to select a element using . symbol</p>
<h2 id="idd">ID Selector</h2>
<p>ID selector is used to select a element using # symbol</p>

<p>Name selector is used to select a element using name</p>

</html>
